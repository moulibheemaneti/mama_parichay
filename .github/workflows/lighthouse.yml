name: Lighthouse CI

# Triggers automatically when Vercel finishes a preview deployment
# No polling, no waiting — Vercel fires this event on its own
on:
  deployment_status:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    # Only run when Vercel deployment succeeded — skip failed or pending deploys
    if: github.event.deployment_status.state == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse audit on Vercel preview URL
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Vercel injects the preview URL automatically via deployment_status event
          urls: ${{ github.event.deployment_status.target_url }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true   # stores report for 7 days, no server needed
          runs: 2                        # run twice, take median — reduces flakiness

      - name: Post Lighthouse scores as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const manifest = ${{ steps.lighthouse.outputs.manifest }}
            const links = ${{ steps.lighthouse.outputs.links }}

            if (!manifest || manifest.length === 0) return

            const result = manifest[0].summary
            const formatScore = (score) => {
              const val = Math.round(score * 100)
              if (val >= 90) return `🟢 ${val}`
              if (val >= 70) return `🟡 ${val}`
              return `🔴 ${val}`
            }

            const url = Object.keys(links)[0]
            const reportUrl = links[url]

            const body = `## ⚡ Lighthouse Report

            | Category | Score |
            |---|---|
            | Performance | ${formatScore(result['performance'])} |
            | Accessibility | ${formatScore(result['accessibility'])} |
            | Best Practices | ${formatScore(result['best-practices'])} |
            | SEO | ${formatScore(result['seo'])} |

            🔗 [Full report](${reportUrl}) · Audited: ${url}`

            // Find existing PR for this commit and post/update the comment
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.deployment.ref}`
            })

            if (prs.data.length === 0) return

            const prNumber = prs.data[0].number

            // Find existing lighthouse comment to update instead of spamming new ones
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' && c.body.includes('Lighthouse Report')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
