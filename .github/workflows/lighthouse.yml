name: Lighthouse CI

# Triggers automatically when Vercel finishes a preview deployment
# No polling, no waiting — Vercel fires this event on its own
on:
  deployment_status:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    # Only run when Vercel deployment succeeded — skip failed or pending deploys
    if: github.event.deployment_status.state == 'success'

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse audit on Vercel preview URL — Desktop
        id: lighthouse_desktop
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.deployment_status.target_url }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 2
          extraHeaders: '{"x-vercel-protection-bypass": "${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}"}'

      - name: Run Lighthouse audit on Vercel preview URL — Mobile
        id: lighthouse_mobile
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.deployment_status.target_url }}
          configPath: ./lighthouserc.mobile.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 2
          extraHeaders: '{"x-vercel-protection-bypass": "${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}"}'

      - name: Post Lighthouse scores as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const desktopManifest = ${{ steps.lighthouse_desktop.outputs.manifest }}
            const mobileManifest  = ${{ steps.lighthouse_mobile.outputs.manifest }}
            const desktopLinks    = ${{ steps.lighthouse_desktop.outputs.links }}
            const mobileLinks     = ${{ steps.lighthouse_mobile.outputs.links }}

            if (!desktopManifest?.length || !mobileManifest?.length) return

            const desktopResult = desktopManifest[0].summary
            const mobileResult  = mobileManifest[0].summary

            const formatScore = (score) => {
              const val = Math.round(score * 100)
              if (val >= 90) return `🟢 ${val}`
              if (val >= 70) return `🟡 ${val}`
              return `🔴 ${val}`
            }

            const desktopReportUrl = Object.values(desktopLinks)[0]
            const mobileReportUrl  = Object.values(mobileLinks)[0]

            const body = [
              '## ⚡ Lighthouse Report',
              '',
              '| Category | 🖥️ Desktop | 📱 Mobile |',
              '|---|---|---|',
              `| Performance    | ${formatScore(desktopResult['performance'])}    | ${formatScore(mobileResult['performance'])}    |`,
              `| Accessibility  | ${formatScore(desktopResult['accessibility'])}  | ${formatScore(mobileResult['accessibility'])}  |`,
              `| Best Practices | ${formatScore(desktopResult['best-practices'])} | ${formatScore(mobileResult['best-practices'])} |`,
              `| SEO            | ${formatScore(desktopResult['seo'])}            | ${formatScore(mobileResult['seo'])}            |`,
              '',
              `🔗 [Desktop report](${desktopReportUrl}) · [Mobile report](${mobileReportUrl})`,
            ].join('\n')

            const sha = context.payload.deployment.sha

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            })

            if (!prs.data || prs.data.length === 0) {
              console.log('No PR found for commit SHA:', sha)
              return
            }

            const prNumber = prs.data[0].number
            console.log('Posting to PR #' + prNumber)

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Lighthouse Report')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
