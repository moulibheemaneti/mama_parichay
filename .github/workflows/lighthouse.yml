name: Lighthouse CI

# Triggers automatically when Vercel finishes a preview deployment
# No polling, no waiting — Vercel fires this event on its own
on:
  deployment_status:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest

    # Only run when Vercel deployment succeeded — skip failed or pending deploys
    if: github.event.deployment_status.state == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse audit on Vercel preview URL
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Vercel injects the preview URL automatically via deployment_status event
          urls: ${{ github.event.deployment_status.target_url }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true   # stores report for 7 days, no server needed
          runs: 2                        # run twice, take median — reduces flakiness

      - name: Post Lighthouse scores as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const manifest = ${{ steps.lighthouse.outputs.manifest }}
            const links = ${{ steps.lighthouse.outputs.links }}

            if (!manifest || manifest.length === 0) return

            const result = manifest[0].summary
            const formatScore = (score) => {
              const val = Math.round(score * 100)
              if (val >= 90) return `🟢 ${val}`
              if (val >= 70) return `🟡 ${val}`
              return `🔴 ${val}`
            }

            const url = Object.keys(links)[0]
            const reportUrl = links[url]

            const body = `## ⚡ Lighthouse Report\n\n| Category | Score |\n|---|---|\n| Performance | ${formatScore(result['performance'])} |\n| Accessibility | ${formatScore(result['accessibility'])} |\n| Best Practices | ${formatScore(result['best-practices'])} |\n| SEO | ${formatScore(result['seo'])} |\n\n🔗 [Full report](${reportUrl}) · Audited: ${url}`

            // Use the SHA from the deployment to find the associated PR
            const sha = context.payload.deployment.sha

            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            })

            if (!prs.data || prs.data.length === 0) {
              console.log('No PR found for this commit SHA:', sha)
              return
            }

            const prNumber = prs.data[0].number
            console.log('Posting to PR #' + prNumber)

            // Find existing lighthouse comment to update instead of creating a new one
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Lighthouse Report')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
