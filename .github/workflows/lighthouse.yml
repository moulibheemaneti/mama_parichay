name: Lighthouse CI

# Triggers automatically when Vercel finishes a preview deployment
# No polling, no waiting — Vercel fires this event on its own
on:
  deployment_status:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Desktop and Mobile run in parallel ──────────────────────────────────
  lighthouse_desktop:
    name: Lighthouse Audit — Desktop
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'

    outputs:
      manifest: ${{ steps.lighthouse.outputs.manifest }}
      links: ${{ steps.lighthouse.outputs.links }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse audit — Desktop
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.deployment_status.target_url }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          artifactName: lighthouse-desktop
          temporaryPublicStorage: true
          runs: 2

  lighthouse_mobile:
    name: Lighthouse Audit — Mobile
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'

    outputs:
      manifest: ${{ steps.lighthouse.outputs.manifest }}
      links: ${{ steps.lighthouse.outputs.links }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse audit — Mobile
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.deployment_status.target_url }}
          configPath: ./lighthouserc.mobile.json
          uploadArtifacts: true
          artifactName: lighthouse-mobile
          temporaryPublicStorage: true
          runs: 2

  # ─── Combine results and post single PR comment ───────────────────────────
  comment:
    name: Post Lighthouse Comment
    runs-on: ubuntu-latest
    needs: [lighthouse_desktop, lighthouse_mobile]
    if: always() && github.event.deployment_status.state == 'success'

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Post combined scores as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const desktopManifest = ${{ needs.lighthouse_desktop.outputs.manifest || 'null' }}
            const mobileManifest  = ${{ needs.lighthouse_mobile.outputs.manifest || 'null' }}
            const desktopLinks    = ${{ needs.lighthouse_desktop.outputs.links || 'null' }}
            const mobileLinks     = ${{ needs.lighthouse_mobile.outputs.links || 'null' }}

            const formatScore = (score) => {
              if (score == null) return '⚠️ failed'
              const val = Math.round(score * 100)
              if (val >= 90) return `🟢 ${val}`
              if (val >= 70) return `🟡 ${val}`
              return `🔴 ${val}`
            }

            const getScore = (manifest, key) =>
              manifest?.length ? manifest[0].summary[key] : null

            const desktopReportUrl = desktopLinks ? Object.values(desktopLinks)[0] : null
            const mobileReportUrl  = mobileLinks  ? Object.values(mobileLinks)[0]  : null

            const reportLinks = [
              desktopReportUrl ? `[Desktop report](${desktopReportUrl})` : '~~Desktop report~~ (failed)',
              mobileReportUrl  ? `[Mobile report](${mobileReportUrl})`   : '~~Mobile report~~ (failed)',
            ].join(' · ')

            const body = [
              '## ⚡ Lighthouse Report',
              '',
              '| Category | 🖥️ Desktop | 📱 Mobile |',
              '|---|---|---|',
              `| Performance    | ${formatScore(getScore(desktopManifest, 'performance'))}    | ${formatScore(getScore(mobileManifest, 'performance'))}    |`,
              `| Accessibility  | ${formatScore(getScore(desktopManifest, 'accessibility'))}  | ${formatScore(getScore(mobileManifest, 'accessibility'))}  |`,
              `| Best Practices | ${formatScore(getScore(desktopManifest, 'best-practices'))} | ${formatScore(getScore(mobileManifest, 'best-practices'))} |`,
              `| SEO            | ${formatScore(getScore(desktopManifest, 'seo'))}            | ${formatScore(getScore(mobileManifest, 'seo'))}            |`,
              '',
              `🔗 ${reportLinks}`,
            ].join('\n')

            const sha = context.payload.deployment.sha
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            })

            if (!prs.data?.length) {
              console.log('No PR found for commit SHA:', sha)
              return
            }

            const prNumber = prs.data[0].number

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Lighthouse Report')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
