name: Lighthouse CI

on:
  deployment_status:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Desktop and Mobile run in parallel ──────────────────────────────────
  lighthouse_desktop:
    name: Lighthouse Audit — Desktop
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse audit — Desktop
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.deployment_status.target_url }}?x-vercel-protection-bypass=${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          artifactName: lighthouse-desktop
          temporaryPublicStorage: true
          runs: 2

  lighthouse_mobile:
    name: Lighthouse Audit — Mobile
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse audit — Mobile
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.deployment_status.target_url }}?x-vercel-protection-bypass=${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          configPath: ./lighthouserc.mobile.json
          uploadArtifacts: true
          artifactName: lighthouse-mobile
          temporaryPublicStorage: true
          runs: 2

  comment:
    name: Post Lighthouse Comment
    runs-on: ubuntu-latest
    needs: [lighthouse_desktop, lighthouse_mobile]
    if: always() && github.event.deployment_status.state == 'success'

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Download desktop artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: lighthouse-desktop
          path: ./lighthouse-desktop

      - name: Download mobile artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: lighthouse-mobile
          path: ./lighthouse-mobile

      - name: Post combined scores as PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const path = require('path')

            const readManifest = (dir) => {
              try {
                const manifestPath = path.join(dir, 'manifest.json')
                if (!fs.existsSync(manifestPath)) return null
                const data = JSON.parse(fs.readFileSync(manifestPath, 'utf8'))
                return Array.isArray(data) ? data : null
              } catch {
                return null
              }
            }

            const readLinks = (dir) => {
              try {
                const linksPath = path.join(dir, 'links.json')
                if (!fs.existsSync(linksPath)) return null
                return JSON.parse(fs.readFileSync(linksPath, 'utf8'))
              } catch {
                return null
              }
            }

            const desktopManifest = readManifest('./lighthouse-desktop')
            const mobileManifest  = readManifest('./lighthouse-mobile')
            const desktopLinks    = readLinks('./lighthouse-desktop')
            const mobileLinks     = readLinks('./lighthouse-mobile')

            const formatScore = (score) => {
              if (score == null) return '⚠️ failed'
              const val = Math.round(score * 100)
              if (val >= 90) return `🟢 ${val}`
              if (val >= 70) return `🟡 ${val}`
              return `🔴 ${val}`
            }

            const getScore = (manifest, key) =>
              manifest?.length ? manifest[0].summary[key] : null

            const desktopReportUrl = desktopLinks ? Object.values(desktopLinks)[0] : null
            const mobileReportUrl  = mobileLinks  ? Object.values(mobileLinks)[0]  : null

            const reportLinks = [
              desktopReportUrl ? `[Desktop report](${desktopReportUrl})` : '~~Desktop report~~ (failed)',
              mobileReportUrl  ? `[Mobile report](${mobileReportUrl})`   : '~~Mobile report~~ (failed)',
            ].join(' · ')

            const body = [
              '## ⚡ Lighthouse Report',
              '',
              '| Category | 🖥️ Desktop | 📱 Mobile |',
              '|---|---|---|',
              `| Performance    | ${formatScore(getScore(desktopManifest, 'performance'))}    | ${formatScore(getScore(mobileManifest, 'performance'))}    |`,
              `| Accessibility  | ${formatScore(getScore(desktopManifest, 'accessibility'))}  | ${formatScore(getScore(mobileManifest, 'accessibility'))}  |`,
              `| Best Practices | ${formatScore(getScore(desktopManifest, 'best-practices'))} | ${formatScore(getScore(mobileManifest, 'best-practices'))} |`,
              `| SEO            | ${formatScore(getScore(desktopManifest, 'seo'))}            | ${formatScore(getScore(mobileManifest, 'seo'))}            |`,
              '',
              `🔗 ${reportLinks}`,
            ].join('\n')

            const sha = context.payload.deployment.sha
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            })

            if (!prs.data?.length) {
              console.log('No PR found for commit SHA:', sha)
              return
            }

            const prNumber = prs.data[0].number

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Lighthouse Report')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
