name: Lighthouse CI

on:
  deployment_status:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ─── Desktop and Mobile run in parallel ──────────────────────────────────
  lighthouse_desktop:
    name: Lighthouse Audit — Desktop
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse audit — Desktop
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.deployment_status.target_url }}?x-vercel-protection-bypass=${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          artifactName: lighthouse-desktop
          temporaryPublicStorage: true
          runs: 2

  lighthouse_mobile:
    name: Lighthouse Audit — Mobile
    runs-on: ubuntu-latest
    if: github.event.deployment_status.state == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Lighthouse audit — Mobile
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: ${{ github.event.deployment_status.target_url }}?x-vercel-protection-bypass=${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          configPath: ./lighthouserc.mobile.json
          uploadArtifacts: true
          artifactName: lighthouse-mobile
          temporaryPublicStorage: true
          runs: 2

  comment:
    name: Post Lighthouse Comment
    runs-on: ubuntu-latest
    needs: [lighthouse_desktop, lighthouse_mobile]
    if: always() && github.event.deployment_status.state == 'success'

    permissions:
      pull-requests: write
      issues: write

    steps:
      - name: Download desktop artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: lighthouse-desktop
          path: ./lighthouse-desktop

      - name: Download mobile artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: lighthouse-mobile
          path: ./lighthouse-mobile

      - name: Post combined scores as PR comment
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs')
            const path = require('path')

            // Read scores from lhr-*.json files (Lighthouse result files)
            const readLhrScores = (dir) => {
              try {
                if (!fs.existsSync(dir)) return null
                const files = fs.readdirSync(dir).filter(f => f.startsWith('lhr-') && f.endsWith('.json'))
                if (!files.length) return null
                // Take the last run (most recent)
                const lhr = JSON.parse(fs.readFileSync(path.join(dir, files[files.length - 1]), 'utf8'))
                return {
                  performance:    lhr.categories?.performance?.score,
                  accessibility:  lhr.categories?.accessibility?.score,
                  'best-practices': lhr.categories?.['best-practices']?.score,
                  seo:            lhr.categories?.seo?.score,
                  reportUrl:      null, // resolved separately from assertion-results.json
                }
              } catch (e) {
                console.log('Error reading lhr:', e.message)
                return null
              }
            }

            const desktop = readLhrScores('./lighthouse-desktop')
            const mobile  = readLhrScores('./lighthouse-mobile')

            const formatScore = (score) => {
              if (score == null) return '⚠️ failed'
              const val = Math.round(score * 100)
              if (val >= 90) return `🟢 ${val}`
              if (val >= 70) return `🟡 ${val}`
              return `🔴 ${val}`
            }

            // Read the finalUrl from lhr-*.json — this is the actual audited page URL
            // Strip bypass secret query param before displaying in PR comment
            const readFinalUrl = (dir) => {
              try {
                if (!fs.existsSync(dir)) return null
                const files = fs.readdirSync(dir).filter(f => f.startsWith('lhr-') && f.endsWith('.json'))
                if (!files.length) return null
                const lhr = JSON.parse(fs.readFileSync(path.join(dir, files[files.length - 1]), 'utf8'))
                const url = lhr.finalUrl || lhr.requestedUrl || null
                return url ? url.split('?')[0] : null
              } catch { return null }
            }

            const desktopAuditedUrl = readFinalUrl('./lighthouse-desktop')
            const mobileAuditedUrl  = readFinalUrl('./lighthouse-mobile')

            const reportLinks = [
              desktopAuditedUrl ? `[Desktop report](${desktopAuditedUrl})` : '~~Desktop report~~ (failed)',
              mobileAuditedUrl  ? `[Mobile report](${mobileAuditedUrl})`   : '~~Mobile report~~ (failed)',
            ].join(' · ')

            const body = [
              '## ⚡ Lighthouse Report',
              '',
              '| Category | 🖥️ Desktop | 📱 Mobile |',
              '|---|---|---|',
              `| Performance    | ${formatScore(desktop?.performance)}    | ${formatScore(mobile?.performance)}    |`,
              `| Accessibility  | ${formatScore(desktop?.accessibility)}  | ${formatScore(mobile?.accessibility)}  |`,
              `| Best Practices | ${formatScore(desktop?.['best-practices'])} | ${formatScore(mobile?.['best-practices'])} |`,
              `| SEO            | ${formatScore(desktop?.seo)}            | ${formatScore(mobile?.seo)}            |`,
              '',
              `🔗 ${reportLinks}`,
            ].join('\n')

            const sha = context.payload.deployment.sha
            const prs = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            })

            if (!prs.data?.length) {
              console.log('No PR found for commit SHA:', sha)
              return
            }

            const prNumber = prs.data[0].number

            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            })

            const existing = comments.data.find(c =>
              c.user.login === 'github-actions[bot]' &&
              c.body.includes('Lighthouse Report')
            )

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              })
            }
